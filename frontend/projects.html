<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectos | SGII</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <h2>SGII</h2>
            <span>Innovatech Solutions</span>
        </div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="projects.html" class="active">Proyectos</a>
            <a href="#" id="logoutBtn">Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Gestión de Proyectos</h1>
            <button id="createProjectBtn" class="btn-primary">+ Nuevo Proyecto</button>
        </div>

        <div id="projectModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Crear Nuevo Proyecto</h2>
                <form id="projectForm">
                    <div class="form-group">
                        <label for="projectName">Nombre del Proyecto *</label>
                        <input type="text" id="projectName" required>
                    </div>
                    <div class="form-group">
                        <label for="projectDescription">Descripción</label>
                        <textarea id="projectDescription" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="projectStartDate">Fecha de Inicio</label>
                            <input type="date" id="projectStartDate">
                        </div>
                        <div class="form-group">
                            <label for="projectEndDate">Fecha de Fin</label>
                            <input type="date" id="projectEndDate">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="projectStatus">Estado</label>
                        <select id="projectStatus">
                            <option value="planning">Planificación</option>
                            <option value="active">Activo</option>
                            <option value="completed">Completado</option>
                            <option value="cancelled">Cancelado</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Crear Proyecto</button>
                </form>
            </div>
        </div>

        <div id="projectsList">
            <p>Cargando proyectos...</p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/projects.js"></script>
</body>
</html>
