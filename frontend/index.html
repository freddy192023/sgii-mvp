<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGII - Login | Innovatech</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>SGII</h1>
                <p>Sistema de Gestión Integrado Innovatech</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="btn-primary">Iniciar Sesión</button>
                <p class="register-link">¿No tienes cuenta? <a href="#" onclick="showRegister()">Regístrate aquí</a></p>
            </form>

            <form id="registerForm" style="display: none;">
                <div class="form-group">
                    <label for="reg-username">Usuario</label>
                    <input type="text" id="reg-username" placeholder="Elige un usuario" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="reg-fullname">Nombre completo</label>
                    <input type="text" id="reg-fullname" placeholder="Tu nombre completo">
                </div>
                <div class="form-group">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Crea una contraseña" required>
                </div>
                <button type="submit" class="btn-primary">Registrarse</button>
                <p class="register-link">¿Ya tienes cuenta? <a href="#" onclick="showLogin()">Inicia sesión aquí</a></p>
            </form>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
